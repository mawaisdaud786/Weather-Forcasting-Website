<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Weather</title>
	<link rel="stylesheet" href="style.css">
</head>
<body>
	<div class="container">
		<div class="heading">
			<h1>Discover the Weather in Your City</h1>
			<h2>Plan Your Day with Live Updates</h2>
		</div>
		<div class="main">
		<div class="cityname">
			<input type="search" name="cityname" id="cityname" placeholder="Enter Your City Name">
			<button id="btn"><img src="png-transparent-computer-icons-web-search-engine-search-box-introduction-internet-microsoft-autocomplete.png" alt=""></button>
		</div>
		<div class="deetscontainer">
			<p id="error" style="color: red;"></p>
			<div class="city">
				<h2>Your City</h2>
			</div>
			
			<div class="othercontainer">
				<div class="temp">
				<img src="—Pngtree—weather icon_4468240.png" alt="">
				<h3>-- 'C</h3>
			</div>
				<div class="humidity">
					<img src="imgbin_73b42955401437c4ef4b8cca5811c4a5.png" alt="">
					<h3>-- %</h3>
				</div>
				<div class="wind">
					<img src="imgbin_f66862b687d8cfe2d7d27fed7240b7bc.png" alt="">
					<h3>-- Km/s</h3>
				</div>
			</div>
		</div>
	</div>
	</div>
	<script src="script.js"></script>
</body>
</html>
